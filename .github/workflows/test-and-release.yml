name: Test and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  pull_request: {}

permissions:
  id-token: write
  contents: write

jobs:
  check-and-lint:
    if: contains(github.event.head_commit.message || github.event.pull_request.title || '', '[skip ci]') == false

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript code
        run: npm run lint

      - name: Compile TypeScript code
        run: npm run build

  unit-tests:
    if: contains(github.event.head_commit.message || github.event.pull_request.title || '', '[skip ci]') == false

    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run component tests
        run: npm run test:ts
        env:
          CI: true

  deploy:
    if: |
      contains(github.event.head_commit.message || github.event.pull_request.title || '', '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    needs: [check-and-lint, unit-tests]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Extract the version and commit body from the tag
        id: extract_release
        run: |
          VERSION="${{ github.ref }}"
          VERSION=${VERSION##*/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          EOF=$(od -An -N6 -x /dev/urandom | tr -d ' ')
          BODY=$(git show -s --format=%b)
          echo "BODY<<$EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          if [[ $VERSION == *"-"* ]]; then
            echo "TAG=--tag next" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm ci

      - name: Create a clean build
        run: npm run build

      - name: Publish package to npm
        run: npm publish ${{ steps.extract_release.outputs.TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release v${{ steps.extract_release.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.extract_release.outputs.VERSION, '-') }}
          body: ${{ steps.extract_release.outputs.BODY }}
